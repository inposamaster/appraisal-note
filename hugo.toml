baseURL = "https://appraisal-note.inposa.net/"
locale = "ko-kr"
defaultContentLanguage = "ko"
title = "감정평가 노트"
theme = "PaperMod"

enableRobotsTXT = false
buildDrafts = false
buildFuture = false
buildExpired = false

# GA4 (계정: 인포사 · 속성: 감정평가 노트 · 스트림 15258765109)
[services.googleAnalytics]
  ID = "G-1TLH9DQ9S0"

[markup.goldmark.renderer]
  unsafe = true

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[languages.ko]
  label = "한국어"
  weight = 1
  title = "감정평가 노트"

  [languages.ko.params]
    description = "상속·경매·전세까지, 부동산 감정평가 실무 노트"

[params]
  env = "production"
  description = "상속·경매·전세까지, 부동산 감정평가 실무 노트"
  keywords = ["감정평가", "부동산 감정평가", "상속", "경매", "전세", "공매"]
  author = "감정평가 노트"
  byline = "감정평가 사무소 현장 정리"
  mainSections = ["posts"]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = false

  [params.label]
    iconSVG = """<svg class="site-logo" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>"""

  [params.assets]
    favicon = "favicon.ico"
    favicon16x16 = "favicon-16x16.png"
    favicon32x32 = "favicon-32x32.png"
    apple_touch_icon = "apple-touch-icon.png"
    safari_pinned_tab = "safari-pinned-tab.svg"
    theme_color = "#166534"
    msapplication_TileColor = "#166534"

  [[params.categoryNav]]
    name = "감정평가 기초"
    slug = "감정평가-기초"
    desc = "개념, 평가 방법, 용어"

  [[params.categoryNav]]
    name = "서류·권리"
    slug = "서류권리"
    desc = "등기, 대장, 권리분석"

  [[params.categoryNav]]
    name = "상속·절세"
    slug = "상속절세"
    desc = "신고 가액, 상속·증여·절세"

  [[params.categoryNav]]
    name = "경매·전세"
    slug = "경매전세"
    desc = "경매·공매, 전세·유형별"

  [params.footer]
    disclaimer = "일반 정보 안내 목적입니다. 세무·법률·감정평가 판단은 전문가와 확인하세요."

  # AdSense (승인 전에도 <head> 코드·ads.txt 배치 — Google 안내)
  [params.adsense]
    publisher = "ca-pub-6632240269170834"
    enabled = true

  # 검색엔진 소유 확인 (네이버 서치어드바이저 HTML 메타)
  [params.analytics]
    [params.analytics.naver]
      SiteVerificationTag = "181d00c56490b8d7b652bfd15adeba5aeb7b28cc"

  [params.homeInfoParams]
    Eyebrow = "내 집 마련을 위하여"
    Title = "부동산 감정평가, 공부한 것과 책상에 남긴 것을 기록합니다"
    Content = """
감정평가 사무소에서 배운 것, 스스로 찾아본 것—상속·경매·전세로 이어지는 질문을 하나씩 글로 쌓고 있습니다. 나중에 다시 읽기 쉽게, 현장에서 듣는 말투에 가깝게 적어 둡니다.

면허를 딴 감정평가사의 글이 아닙니다. 일반 정보 안내이며, [소개](/about/)에서 다루는 범위와 한계를 확인할 수 있습니다.
"""

[[menu.main]]
  identifier = "categories"
  name = "탐색"
  url = "/categories/"
  weight = 5

[[menu.main]]
  identifier = "posts"
  name = "글"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "search"
  name = "검색"
  url = "/search/"
  weight = 40

[[menu.main]]
  identifier = "about"
  name = "소개"
  url = "/about/"
  weight = 90

[[menu.main]]
  identifier = "contact"
  name = "연락처"
  url = "/contact/"
  weight = 91

[[menu.main]]
  identifier = "privacy"
  name = "개인정보"
  url = "/privacy/"
  weight = 92

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 100
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]
